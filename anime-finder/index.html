<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Anime Finder</title>
    <link rel="stylesheet" href="css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
        body {
            padding-top: 70px;
        }
      /* Navbar */
      .navbar-green {
        background: var(--green-primary);
        background: linear-gradient(
          to right,
          var(--green-primary),
          var(--green-dark)
        );
        box-shadow: 0 4px 12px #00000026;
      }

      .navbar-brand {
        font-weight: 600;
        letter-spacing: 0.5px;
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-dark navbar-green p-3 mb-4 fixed-top">
      <div class="d-flex justify-content-between align-items-start w-100">
        <div class="d-flex align-items-center">
          <a href="../index.html" class="btn btn-outline-dark btn-sm me-3">
            <i class="fas fa-arrow-left"></i> Kembali
          </a>
          <span class="navbar-brand mb-0 h1 fs-4 text-dark">
            <i class="fas fa-film me-2"></i> Anime Finder
          </span>
        </div>
      </div>
    </nav>

    <header>
      <h1>Anime Finder</h1>
      <div class="search-box">
<input type="text" id="searchInput" placeholder="Search anime..." aria-label="Search anime" />
        <button id="searchBtn" aria-label="Search">Search</button>
      </div>
<select id="genreSelect" aria-label="Filter by genre">
        <option value="">Select Genre</option>
      </select>
      <select id="ratingSelect" aria-label="Filter by rating">
        <option value="all">All Ratings</option>
        <option value="safe">Safe Only</option>
        <option value="adult">17+ Allowed</option>
      </select>
      <button id="themeToggle" aria-label="Toggle dark mode">🌙 Dark Mode</button>
    </header>

    <h2 style="padding-left: 20px">❤️ My Favorites</h2>
    <div id="favoriteContainer" class="anime-grid"></div>

    <main>
      <div id="animeContainer" class="anime-grid">
        <!-- Anime cards will appear here -->
      </div>
    </main>

    <script src="js/main.js"></script>
  </body>
</html>
