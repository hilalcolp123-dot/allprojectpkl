<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Anime Schedule</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Anime Schedule</h1>
    <div class="days">
<button class="day-btn" data-day="monday">Senin</button>
<button class="day-btn" data-day="tuesday">Selasa</button>
<button class="day-btn" data-day="wednesday">Rabu</button>
<button class="day-btn" data-day="thursday">Kamis</button>
<button class="day-btn" data-day="friday">Jum</batutton>
<button class="day-btn" data-day="saturday">Sabtu</button>
<button class="day-btn" data-day="sunday">Minggu</button>
    </div>
</header>

<div id="status"></div>
<div id="anime-list"></div>

<div id="modal" class="modal hidden">
    <div class="modal-content">
        <span id="closeModal">&times;</span>
        <div id="modal-body"></div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
