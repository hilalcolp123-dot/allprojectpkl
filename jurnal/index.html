<!doctype html>
<html lang="id" class="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- PWA Meta Tags -->
     <link rel="shortcut icon" href="icon-512.png" type="image/png"/>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="theme-color" content="#4f46e5" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <title>Jurnal PKL PWA</title>

    <!-- Dynamic Manifest Injection -->
    <link rel="manifest" id="pwa-manifest" href="" />

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <!-- Google Fonts: Inter -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            fontFamily: { sans: ["Inter", "sans-serif"] },
            colors: { primary: "#4f46e5" },
          },
        },
      };
    </script>
    <style>
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
      }
      .dark ::-webkit-scrollbar-thumb {
        background: #475569;
      }
      .calendar-grid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 4px;
      }
      .calendar-day {
        aspect-ratio: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-size: 0.875rem;
        border-radius: 0.5rem;
        transition: all 0.2s;
      }
    </style>
  </head>
  <body
    class="bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-100 font-sans transition-colors duration-200"
  >
    <!-- Toast Notification -->
    <div
      id="toast"
      class="fixed top-5 right-5 transform translate-x-full transition-transform duration-300 z-50 flex items-center bg-white dark:bg-gray-800 shadow-lg rounded-xl border-l-4 border-green-500 px-4 py-3 opacity-0"
    >
      <i class="fas fa-check-circle text-green-500 mr-3 text-xl"></i>
      <span id="toast-msg" class="font-medium text-sm">Berhasil!</span>
    </div>

    <!-- Layout Utama -->
    <div
      class="max-w-md mx-auto min-h-screen relative shadow-2xl bg-white dark:bg-gray-800 flex flex-col overflow-hidden border-x border-gray-100 dark:border-gray-800"
    >
      <!-- Header -->
      <header
        class="flex justify-between items-center p-5 bg-white/80 dark:bg-gray-800/80 backdrop-blur-md sticky top-0 z-20 border-b border-gray-100 dark:border-gray-700"
      >
        <div class="flex items-center gap-3">
          <div
            class="bg-gradient-to-br from-indigo-500 to-primary text-white p-2 rounded-xl shadow-md flex items-center justify-center h-9 w-9"
          >
            <i class="fas fa-bolt"></i>
          </div>
          <div>
            <h1 class="font-bold text-lg leading-none tracking-tight">
              Jurnal PKL
            </h1>
            <p
              class="text-[10px] text-gray-500 dark:text-gray-400 font-medium tracking-wider uppercase mt-1"
            >
              PWA & Offline Ready
            </p>
          </div>
        </div>
        <div class="flex gap-2">
          <button
            onclick="requestNotification()"
            class="text-yellow-500 hover:text-yellow-600 transition-colors h-9 w-9 rounded-full bg-yellow-50 dark:bg-yellow-900/20 flex items-center justify-center"
            title="Aktifkan Reminder 20:00"
          >
            <i class="fas fa-bell"></i>
          </button>
          <button
            id="theme-toggle"
            class="text-gray-400 hover:text-primary transition-colors h-9 w-9 rounded-full bg-gray-50 dark:bg-gray-700 flex items-center justify-center"
          >
            <i class="fas fa-moon" id="theme-icon"></i>
          </button>
        </div>
      </header>

      <!-- Main Content -->
      <main class="flex-1 overflow-y-auto p-5 pb-24" id="main-content">
        <!-- VIEW: DASHBOARD -->
        <section id="view-dashboard" class="space-y-6 animate-fade-in">
          <div class="flex justify-between items-end">
            <div>
              <p
                class="text-sm text-gray-500 dark:text-gray-400 font-medium"
                id="today-date-display"
              ></p>
              <h2 class="text-2xl font-bold mt-1">Halo, Semangat! 👋</h2>
            </div>
          </div>

          <!-- Status Card -->
          <div
            id="status-card"
            class="rounded-2xl p-4 shadow-sm border flex items-center justify-between cursor-pointer"
            onclick="navTo('write')"
          >
            <div class="flex items-center gap-4">
              <div
                id="status-icon"
                class="h-10 w-10 rounded-full flex items-center justify-center text-lg shrink-0"
              ></div>
              <div>
                <p class="text-xs text-gray-500 dark:text-gray-400 mb-0.5">
                  Status Hari Ini
                </p>
                <p id="status-text" class="font-semibold text-sm"></p>
              </div>
            </div>
            <i class="fas fa-chevron-right text-gray-300"></i>
          </div>

          <div
            class="bg-indigo-50 dark:bg-indigo-900/20 p-4 rounded-2xl border border-indigo-100 dark:border-indigo-800/50"
          >
            <p
              class="text-indigo-600 dark:text-indigo-400 text-xs font-semibold mb-1 uppercase tracking-wider"
            >
              Total Jurnal Tersimpan
            </p>
            <p
              id="stat-total"
              class="text-3xl font-bold text-indigo-900 dark:text-indigo-100"
            >
              0
            </p>
          </div>

          <div class="space-y-3 pt-2">
            <button
              onclick="navTo('write')"
              class="w-full bg-primary hover:bg-indigo-600 text-white font-semibold py-3.5 px-4 rounded-xl shadow-lg transition-all flex items-center justify-center gap-2"
            >
              <i class="fas fa-pen-nib"></i> Tulis Jurnal Hari Ini
            </button>
          </div>
        </section>

        <!-- VIEW: WRITE/EDIT JOURNAL -->
        <section id="view-write" class="hidden space-y-5 animate-fade-in">
          <div class="flex items-center justify-between mb-2">
            <button
              onclick="navTo('dashboard')"
              class="text-gray-400 hover:text-gray-800 dark:hover:text-white"
            >
              <i class="fas fa-arrow-left text-lg"></i>
            </button>
            <h2 id="form-title" class="text-xl font-bold">Tulis Jurnal</h2>
          </div>

          <form id="journal-form" class="space-y-4">
            <input type="hidden" id="entry-id" />

            <div class="grid grid-cols-2 gap-3">
              <div>
                <label
                  class="block text-xs font-semibold text-gray-500 uppercase mb-1"
                  >Tanggal</label
                >
                <input
                  type="date"
                  id="entry-date"
                  required
                  class="w-full px-3 py-2.5 rounded-xl border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-900 text-sm focus:ring-2 focus:ring-primary outline-none"
                />
              </div>
              <div>
                <label
                  class="block text-xs font-semibold text-gray-500 uppercase mb-1"
                  >Kategori</label
                >
                <select
                  id="entry-notes"
                  class="w-full px-3 py-2.5 rounded-xl border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-900 text-sm focus:ring-2 focus:ring-primary outline-none"
                >
                  <option value="Programming">Programming</option>
                  <option value="Design">Design</option>
                  <option value="Meeting">Meeting</option>
                  <option value="Lainnya">Lainnya</option>
                </select>
              </div>
            </div>

            <div>
              <label
                class="block text-xs font-semibold text-gray-500 uppercase mb-1"
                >Judul Kegiatan</label
              >
              <input
                type="text"
                id="entry-title"
                required
                class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-900 text-sm focus:ring-2 focus:ring-primary outline-none"
              />
            </div>

            <div>
              <label
                class="block text-xs font-semibold text-gray-500 uppercase mb-1"
                >Deskripsi</label
              >
              <textarea
                id="entry-desc"
                rows="5"
                required
                class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-900 text-sm focus:ring-2 focus:ring-primary outline-none resize-none"
              ></textarea>
            </div>

            <!-- Upload Blob -->
            <div>
              <label
                class="block text-xs font-semibold text-gray-500 uppercase mb-1"
                >Lampiran Foto (Disimpan sbg Blob)</label
              >
              <div
                class="relative border-2 border-dashed border-gray-300 dark:border-gray-600 rounded-xl p-4 text-center hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors"
              >
                <input
                  type="file"
                  id="entry-image"
                  accept="image/*"
                  class="absolute inset-0 w-full h-full opacity-0 cursor-pointer"
                  onchange="previewBlobImage(event)"
                />
                <div id="image-placeholder" class="pointer-events-none">
                  <i
                    class="fas fa-cloud-upload-alt text-2xl text-gray-400 mb-2"
                  ></i>
                  <p class="text-xs text-gray-500">
                    Tap untuk upload gambar asli
                  </p>
                </div>
                <img
                  id="image-preview"
                  src=""
                  class="hidden max-h-32 mx-auto rounded-lg object-cover"
                />
              </div>
            </div>

            <div class="pt-4 border-t border-gray-100 dark:border-gray-700">
              <button
                type="submit"
                class="w-full bg-primary hover:bg-indigo-600 text-white font-medium py-3 rounded-xl shadow-lg transition-all flex items-center justify-center gap-2"
              >
                <i class="fas fa-save"></i> Simpan ke Penyimpanan
              </button>
            </div>
          </form>
        </section>

        <!-- VIEW: HISTORY -->
        <section id="view-history" class="hidden space-y-4 animate-fade-in">
          <h2 class="text-xl font-bold mb-4">Riwayat Jurnal</h2>
          <div id="history-list" class="space-y-3 mt-2"></div>
        </section>

        <!-- VIEW: DETAIL -->
        <section id="view-detail" class="hidden space-y-5 animate-fade-in">
          <div class="flex items-center gap-3 mb-2">
            <button
              onclick="navTo('history')"
              class="text-gray-400 hover:text-gray-800 dark:hover:text-white"
            >
              <i class="fas fa-arrow-left text-lg"></i>
            </button>
            <h2 class="text-xl font-bold">Detail Jurnal</h2>
          </div>

          <div
            class="bg-white dark:bg-gray-800 p-5 rounded-2xl border border-gray-100 dark:border-gray-700 shadow-sm"
          >
            <div
              class="mb-4 pb-4 border-b border-gray-100 dark:border-gray-700"
            >
              <p
                id="detail-date"
                class="text-primary font-medium text-xs mb-1"
              ></p>
              <h3 id="detail-title" class="text-xl font-bold mt-2"></h3>
              <p
                id="detail-notes"
                class="text-xs text-gray-500 mt-1 uppercase"
              ></p>
            </div>

            <p
              id="detail-desc"
              class="text-sm text-gray-700 dark:text-gray-300 whitespace-pre-line leading-relaxed mb-4"
            ></p>

            <!-- Image Download Container -->
            <div
              id="detail-image-container"
              class="hidden mt-4 pt-4 border-t border-gray-100 dark:border-gray-700"
            >
              <p class="text-xs text-gray-500 uppercase font-semibold mb-2">
                Lampiran Foto Blob
              </p>
              <img
                id="detail-image"
                src=""
                class="w-full rounded-xl border border-gray-200 dark:border-gray-700 mb-3"
              />
              <button
                id="btn-download-photo"
                class="w-full bg-green-50 text-green-700 dark:bg-green-900/30 dark:text-green-400 border border-green-200 dark:border-green-800 py-2.5 rounded-xl text-sm font-semibold flex items-center justify-center gap-2"
              >
                <i class="fas fa-download"></i> Download Foto Asli
              </button>
            </div>
          </div>

          <div class="flex gap-3">
            <button
              onclick="editCurrentJournal()"
              class="flex-1 bg-gray-50 border py-3 rounded-xl text-sm font-semibold flex items-center justify-center gap-2 hover:bg-gray-100 dark:bg-gray-700 dark:border-gray-600"
            >
              <i class="fas fa-edit"></i> Edit
            </button>
            <button
              onclick="deleteCurrentJournal()"
              class="flex-1 bg-red-50 text-red-600 border border-red-100 py-3 rounded-xl text-sm font-semibold flex items-center justify-center gap-2 hover:bg-red-100 dark:bg-red-900/20 dark:border-red-900/30"
            >
              <i class="fas fa-trash"></i> Hapus
            </button>
          </div>
        </section>
      </main>

      <!-- Bottom Navigation -->
      <nav
        class="border-t border-gray-100 dark:border-gray-800 bg-white/90 dark:bg-gray-800/90 backdrop-blur-md flex justify-around p-2 pb-safe absolute bottom-0 w-full z-20"
      >
        <button
          onclick="navTo('dashboard')"
          id="nav-dashboard"
          class="nav-btn flex flex-col items-center gap-1 w-16 p-2 text-primary rounded-xl"
        >
          <i class="fas fa-home text-xl mb-0.5"></i
          ><span class="text-[10px] font-semibold">Home</span>
        </button>
        <button
          onclick="navTo('write')"
          id="nav-write"
          class="nav-btn flex flex-col items-center gap-1 w-16 p-2 text-gray-400 rounded-xl"
        >
          <i class="fas fa-plus-circle text-xl mb-0.5"></i
          ><span class="text-[10px] font-semibold">Tulis</span>
        </button>
        <button
          onclick="navTo('history')"
          id="nav-history"
          class="nav-btn flex flex-col items-center gap-1 w-16 p-2 text-gray-400 rounded-xl"
        >
          <i class="fas fa-book-open text-xl mb-0.5"></i
          ><span class="text-[10px] font-semibold">Riwayat</span>
        </button>
      </nav>
    </div>

    <!-- ===== JAVASCRIPT: INDEXED_DB, PWA, LOGIC ===== -->
    <script src="script.js"></script>
  </body>
</html>
