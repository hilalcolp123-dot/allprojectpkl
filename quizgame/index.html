<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz Game</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="screen active" id="start-screen">
        <h1>Quiz Time!</h1>
        <p>Tes Pengetahuan Umum dengan Quiz ini!</p>
        <button id="start-btn">Mulai Quiz</button>
      </div>

      <div class="screen" id="quiz-screen">
        <div class="quiz-header">
          <h2 id="question-text">Pertanyaan disini</h2>
          <div class="quiz-info">
            <p>
              Pertanyaan: <span id="current-question">1</span> of <span id="total-questions">10</span>
            </p>
            <p>
              Skor: <span id="score">0</span>
          </div>
        </div>

        <div class="answers-container" id="answers-container">
          <!-- Tombol Jawaban -->
        </div>
        <div class="progress-bar">
          <div class="progress" id="progress"></div>
        </div>
      </div>
      <div class="screen" id="result-screen">
        <h1>Hasil Quiz</h1>
        <div class="result-info">
          <p>
            Skor Kamu <span id="final-score">0</span> out of
            <span id="max-score">10</span>
          </p>

          <div id="result-message">Good Job!</div>
          <button id="restart-btn">Restart Quiz</button>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
