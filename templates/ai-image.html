<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Image Generator</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <style>
      body {
        background: #0f172a;
        color: #f8fafc;
        font-family: "Inter", sans-serif;
        min-height: 100vh;
      }
      .glass-card {
        background: rgba(30, 41, 59, 0.7);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 20px;
      }
      .btn-ai {
        background: linear-gradient(135deg, #6366f1, #a855f7);
        border: none;
        color: white;
        transition: 0.3s;
      }
      .btn-ai:hover {
        transform: scale(1.05);
        color: white;
      }
      .img-result {
        max-width: 100%;
        border-radius: 15px;
        box-shadow: 0 0 30px rgba(99, 102, 241, 0.3);
      }
      #loading {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="container py-5">
      <div class="text-center mb-5">
        <h1 class="display-4 fw-bold">🎨 AI Image Generator</h1>
        <p class="text-secondary">
          Ubah teks menjadi karya seni menggunakan Stable Diffusion
        </p>
      </div>

      <div class="row justify-content-center">
        <div class="col-md-8">
          <div class="glass-card p-4 mb-4">
            <form method="POST" onsubmit="showLoading()">
              <div class="input-group mb-3">
                <input
                  type="text"
                  name="prompt"
                  class="form-control bg-dark text-white border-secondary"
                  placeholder="Contoh: Cyberpunk city with neon lights..."
                  required
                  value="{{ prompt }}"
                />
                <button class="btn btn-ai px-4" type="submit" id="btnGen">
                  Generate
                </button>
              </div>
            </form>

            {% if error %}
            <div class="alert alert-danger">{{ error }}</div>
            {% endif %}

            <div id="loading" class="text-center py-5">
              <div class="spinner-border text-primary mb-3" role="status"></div>
              <p>AI sedang melukis pesananmu... (Mungkin butuh 10-15 detik)</p>
            </div>

            {% if generated_image %}
            <div class="text-center mt-4 animate__animated animate__fadeIn">
              <img
                src="{{ generated_image }}"
                class="img-result mb-4"
                id="resImg"
              />
              <br />
              <a
                href="{{ generated_image }}"
                download="ai_image.jpg"
                class="btn btn-outline-light rounded-pill"
              >
                <i class="fa-solid fa-download me-2"></i> Simpan Gambar
              </a>
            </div>
            {% endif %}
          </div>
        </div>
      </div>
    </div>

    <script>
      function showLoading() {
        document.getElementById("loading").style.display = "block";
        document.getElementById("btnGen").disabled = true;
        const resImg = document.getElementById("resImg");
        if (resImg) resImg.style.opacity = "0.3";
      }
    </script>
  </body>
</html>
