<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Merge PDF - PDF Tools Pro</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="/static/css/pdf.css"
    />
  </head>
  <body>
    <div class="container py-5">
      <a href="/" class="btn btn-sm btn-outline-secondary mb-4">← Kembali</a>
      <div class="card shadow-sm border-0 p-4">
        <h4 class="fw-bold text-primary mb-4">Merge & Reorder PDF</h4>
        <form id="mergeForm">
          <div id="dropZoneMerge" class="drop-zone mb-4">
            <p class="mb-0 fw-semibold">
              Tarik file PDF ke sini atau klik untuk pilih
            </p>
            <input
              type="file"
              id="fileInputMerge"
              accept=".pdf"
              multiple
              hidden
            />
          </div>
          <div
            id="previewHeader"
            class="d-none d-flex justify-content-between mb-2"
          >
            <small class="fw-bold">SERET UNTUK URUTKAN:</small>
            <button
              type="button"
              class="btn btn-sm btn-link text-danger"
              onclick="location.reload()"
            >
              Reset
            </button>
          </div>
          <div
            id="pagePreview"
            class="row gx-3 gy-4 scroll-area mx-0 bg-light rounded p-3"
          ></div>
          <button
            type="submit"
            id="btnMerge"
            class="btn btn-primary w-100 py-3 fw-bold mt-4"
          >
            Gabungkan & Download
          </button>
        </form>
      </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="/static/js/merge.js"></script>
  </body>
</html>
