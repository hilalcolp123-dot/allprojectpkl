<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Recipe Finder</title>
<link rel="stylesheet" href="/static/css/resep-style.css">
</head>
<body>
<header class="header">

<div class="header-left">
<h1>🍳 Recipe Finder</h1>
<p>Temukan resep dari bahan yang ada di rumah</p>
</div>

<div class="header-right">
<a href="/resep-favorites" class="fav-link">❤️ Favorit</a>

<button class="dark-toggle" onclick="toggleDarkMode()">
🌙 Dark Mode
</button>
</div>

</header>
 <h2 style="text-align: center;">Harap Masukkan Nama Bahan dalam Bahasa Inggris</h2><br>
<div class="search-container">

<input type="text" id="ingredients" placeholder="contoh: egg, chicken, rice">

<button onclick="searchRecipes()">Cari Resep</button>

</div>

<div id="results" class="grid"></div>

<script src="/static/js/resep-script.js"></script>

</body>
</html>
