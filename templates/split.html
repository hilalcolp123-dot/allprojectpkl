<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Split PDF - PDF Tools Pro</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="/static/css/pdf.css"
    />
  </head>
  <body>
    <div class="container py-5">
      <a href="/" class="btn btn-sm btn-outline-secondary mb-4">← Kembali</a>
      <div class="card shadow-sm border-0 p-4">
        <h4 class="fw-bold text-success mb-4">Split PDF Pages</h4>
        <form id="splitForm">
          <div id="dropZoneSplit" class="drop-zone mb-4 border-success">
            <p class="mb-0 fw-semibold text-success">
              Upload 1 File PDF untuk di-Split
            </p>
            <input type="file" id="fileInputSplit" accept=".pdf" hidden />
          </div>

          <div id="splitPreviewContainer" class="d-none">
            <div class="mb-3">
              <label class="small fw-bold">MODE PENGAMBILAN:</label>
              <select class="form-select" id="splitMode">
                <option value="single">Per Halaman (Navigasi)</option>
                <option value="range">Rentang Halaman (Mulai - Sampai)</option>
                <option value="multiple">Halaman Spesifik (1,3,5)</option>
              </select>
            </div>

            <div id="splitInputArea" class="bg-light p-3 rounded mb-3">
              <div id="areaSingle">
                <canvas
                  id="splitCanvas"
                  class="img-fluid rounded shadow-sm mx-auto d-block mb-2"
                  style="max-height: 300px"
                ></canvas>
                <div
                  class="d-flex justify-content-center align-items-center gap-3"
                >
                  <button
                    type="button"
                    class="btn btn-sm btn-secondary"
                    id="prevPage"
                  >
                    ‹
                  </button>
                  <span class="badge bg-dark"
                    >Hal. <span id="curPageText">1</span> /
                    <span id="totalPageText">1</span></span
                  >
                  <button
                    type="button"
                    class="btn btn-sm btn-secondary"
                    id="nextPage"
                  >
                    ›
                  </button>
                </div>
                <input type="hidden" id="splitPageNum" value="1" />
              </div>

              <div id="areaRange" class="d-none">
                <div class="row g-2">
                  <div class="col">
                    <input
                      type="number"
                      id="rangeStart"
                      class="form-control"
                      placeholder="Mulai"
                    />
                  </div>
                  <div class="col">
                    <input
                      type="number"
                      id="rangeEnd"
                      class="form-control"
                      placeholder="Sampai"
                    />
                  </div>
                </div>
              </div>

              <div id="areaMultiple" class="d-none">
                <input
                  type="text"
                  id="multiplePages"
                  class="form-control"
                  placeholder="Contoh: 1, 4, 10"
                />
              </div>

              <div
                id="splitLivePreview"
                class="row gx-2 gy-2 mt-3 border-top pt-3 d-none"
              ></div>
            </div>

            <div class="form-check form-switch mb-3">
              <input class="form-check-input" type="checkbox" id="combinePdf" />
              <label class="form-check-label small fw-bold" for="combinePdf"
                >Jadikan dalam 1 file PDF</label
              >
            </div>
          </div>

          <button
            type="submit"
            id="btnSplit"
            class="btn btn-success w-100 py-3 fw-bold"
            disabled
          >
            Proses & Download
          </button>
        </form>
      </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="/static/js/split.js"></script>
  </body>
</html>
