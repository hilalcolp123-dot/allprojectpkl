<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unit Converter - Flask</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <div class="container mt-5">
      <div class="row justify-content-center">
        <div class="card shadow p-4">
          <h3 class="text-center mb-4">🔄 Smart Converter</h3>

          <form method="POST">
            <div class="mb-3">
              <label class="form-label text-muted">Pilih Konversi</label>
              <select name="unit_type" class="form-select border-primary">
                <option value="c_to_f" {% if unit_type == "c_to_f" %}selected{% endif %}>
                  Celsius ➡ Fahrenheit
                </option>
                <option value="f_to_c" {% if unit_type == "f_to_c" %}selected{% endif %}>
                  Fahrenheit ➡ Celsius
                </option>
                <option value="km_to_mil" {% if unit_type == "km_to_mil" %}selected{% endif %}>
                  KM ➡ Mil
                </option>
                <option value="mil_to_km" {% if unit_type == "mil_to_km" %}selected{% endif %}>
                  Mil ➡ KM
                </option>
                <option value="kg_to_lb" {% if unit_type == "kg_to_lb" %}selected{% endif %}>
                  KG ➡ Pon (Lbs)
                </option>
                <option value="lb_to_kg" {% if unit_type == "lb_to_kg" %}selected{% endif %}>
                  Pon (Lbs) ➡ KG
                </option>
              </select>
            </div>

            <div class="mb-3">
              <input
                type="number"
                step="any"
                name="value"
                class="form-control form-control-lg"
                placeholder="Masukkan angka..."
                value="{{ val }}"
                required
              />
            </div>

            <button type="submit" class="btn btn-primary w-100 fw-bold">
              HITUNG
            </button>
          </form>

          {% if result %}
          <div
            class="mt-4 p-3 bg-light border rounded text-center position-relative"
          >
            <small class="text-uppercase text-muted d-block mb-1"
              >Hasil Konversi</small
            >
            <h2 id="resultText" class="display-6 fw-bold text-dark">
              {{ result }}
            </h2>

            <button
              onclick="copyToClipboard()"
              class="btn btn-outline-secondary btn-sm mt-2"
            >
              <i class="bi bi-clipboard"></i> Salin Hasil
            </button>
            <div
              id="copyFeedback"
              class="text-success small mt-1"
              style="display: none"
            >
              Tersalin ke clipboard!
            </div>
          </div>
          {% endif %}
        </div>
      </div>
    </div>
    <script>
      function copyToClipboard() {
        const text = document.getElementById("resultText").innerText;
        navigator.clipboard.writeText(text).then(() => {
          const feedback = document.getElementById("copyFeedback");
          feedback.style.display = "block";
          setTimeout(() => {
            feedback.style.display = "none";
          }, 2000);
        });
      }
    </script>
  </body>
</html>
