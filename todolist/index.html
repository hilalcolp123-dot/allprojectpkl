<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Modern Todo List</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>My Tasks</h1>
        <button id="theme-toggle">🌙</button>
      </header>

      <form id="todo-form">
        <input
          type="text"
          id="todo-input"
          placeholder="Apa yang ingin dikerjakan?"
          required
        />
        <button type="submit">Tambah</button>
      </form>

      <div class="toolbar">
        <div class="filters" role="tablist" aria-label="Filter tugas">
          <button
            class="filter-btn active"
            data-filter="all"
            role="tab"
            aria-selected="true"
          >
            Semua
          </button>
          <button
            class="filter-btn"
            data-filter="active"
            role="tab"
            aria-selected="false"
          >
            Aktif
          </button>
          <button
            class="filter-btn"
            data-filter="done"
            role="tab"
            aria-selected="false"
          >
            Selesai
          </button>
        </div>

        <div class="actions">
          <label class="search">
            <span class="sr-only">Cari tugas</span>
            <input
              id="search-input"
              type="search"
              placeholder="Cari tugas..."
              autocomplete="off"
            />
          </label>
          <button id="clear-completed" type="button" class="ghost">
            Hapus selesai
          </button>
        </div>
      </div>

      <div class="meta" aria-live="polite">
        <span id="todo-counter">0 tugas</span>
      </div>

      <ul id="todo-list" aria-label="Daftar tugas"></ul>
    </div>

    <div id="edit-modal" class="modal">
      <div class="modal-content">
        <h3>Edit Tugas</h3>
        <input type="text" id="edit-input" />
        <div class="modal-buttons">
          <button id="save-edit">Simpan</button>
          <button id="cancel-edit">Batal</button>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
